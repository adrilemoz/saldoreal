name: Build APK Android

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Build de produção (Vite)
        run: npm run build

      - name: Inicializar plataforma Android
        run: |
          npx cap add android || true
          npx cap copy android
          npx cap sync android

      - name: Gerar ícones Android (Capacitor Assets)
        run: |
          npm install -D @capacitor/assets --legacy-peer-deps
          npx @capacitor/assets generate --android

      - name: Dar permissão ao Gradlew
        run: chmod +x android/gradlew

      - name: Cache do Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build APK debug
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Publicar APK
        uses: actions/upload-artifact@v4
        with:
          name: minhas-financas-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
